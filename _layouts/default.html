<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} - Reflective Nomad</title>
  
  <!-- Google Fonts: Load BEFORE stylesheet -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
  
  <!-- Custom stylesheet using relative_url filter -->
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
</head>
<body>
  <div class="page-container">
    <header class="site-header">
      <div class="header-content">
        <h1 class="site-title"><a href="{{ site.baseurl }}/">Reflective Nomad</a></h1>
        <p class="site-tagline">Independent Philosophy Research & Working Papers</p>
      </div>
    </header>

    <main class="main-content">
      {{ content }}
    </main>

    <footer class="site-footer">
      <p>&copy; 2026 Reflective Nomad. Independent philosophy research.</p>
    </footer>
  </div>
</body>
</html>
